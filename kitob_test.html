<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitob o'qish testi</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1a18;min-height:100vh;padding:2rem 1rem}
.wrap{max-width:720px;margin:0 auto}
.card{background:#fff;border-radius:14px;border:1px solid #e8e6e0;padding:1.5rem;margin-bottom:16px}
h1{font-size:1.5rem;font-weight:600;margin-bottom:4px}
.sub{font-size:14px;color:#777;margin-bottom:1.2rem}
label{display:block;font-size:13px;font-weight:500;color:#555;margin-bottom:5px;margin-top:14px}
label:first-of-type{margin-top:0}
input{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:15px;color:#1a1a18;background:#fff;outline:none;transition:border-color .15s;letter-spacing:1px}
input:focus{border-color:#1a1a18}
.btn{padding:10px 22px;border-radius:8px;border:1px solid #1a1a18;font-size:14px;font-weight:500;cursor:pointer;transition:opacity .15s;background:#1a1a18;color:#fff}
.btn:hover{opacity:.82}
.btn:disabled{opacity:.35;cursor:default}
.btn-out{background:transparent;color:#1a1a18}
.btn-out:hover{background:#f5f4f0;opacity:1}
.passport-wrap{position:relative}
.passport-wrap .qbtn{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:#1a1a18;color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:13px;cursor:pointer;font-weight:500}
.passport-wrap .qbtn:disabled{opacity:.4}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.info-item{background:#f5f4f0;border-radius:8px;padding:10px 12px}
.info-label{font-size:11px;color:#888;margin-bottom:3px;text-transform:uppercase;letter-spacing:0.5px}
.info-val{font-size:13px;font-weight:500;color:#1a1a18;line-height:1.4}
.student-card{background:#f0efe9;border-radius:10px;border:1px solid #e0ddd5;padding:1rem 1.2rem;margin-top:14px}
.student-name{font-size:16px;font-weight:600;color:#1a1a18;margin-bottom:10px}
.errmsg{font-size:13px;color:#A32D2D;margin-top:8px;padding:8px 12px;background:#FCEBEB;border-radius:7px;display:none}
.book-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;margin-top:1rem}
.bcard{border:1px solid #e8e6e0;border-radius:10px;padding:12px;cursor:pointer;transition:border-color .15s,background .15s}
.bcard:hover{border-color:#aaa;background:#fafaf8}
.bcard.on{border-color:#1a1a18;background:#f0efe9}
.bcard .bt{font-size:13px;font-weight:500;line-height:1.4}
.bcard .ba{font-size:12px;color:#888;margin-top:3px}
.bcard .bs{font-size:11px;margin-top:4px}
.pass-s{color:#3B6D11}.fail-s{color:#A32D2D}
.qblock{background:#fff;border-radius:12px;border:1px solid #e8e6e0;padding:1.1rem 1.3rem;margin-bottom:12px}
.qt{font-size:14px;font-weight:500;margin-bottom:12px;line-height:1.5}
.opt{display:flex;align-items:flex-start;gap:9px;padding:8px 11px;border-radius:7px;cursor:pointer;border:1px solid #e8e6e0;margin-bottom:6px;font-size:13px;color:#333;transition:background .12s,border-color .12s;user-select:none}
.opt:last-child{margin-bottom:0}
.opt:hover{background:#f5f4f0;border-color:#ccc}
.opt.sel{border-color:#1a1a18;background:#f0efe9}
.opt.ok{border-color:#3B6D11;background:#EAF3DE;color:#173404}
.opt.err{border-color:#A32D2D;background:#FCEBEB;color:#501313}
.ol{font-weight:600;min-width:16px;font-size:12px;opacity:.65;padding-top:1px}
.opt.sel .ol,.opt.ok .ol,.opt.err .ol{opacity:1}
.bar{display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-top:1rem}
.prog{font-size:13px;color:#888}
.tag{display:inline-block;font-size:12px;font-weight:500;border-radius:6px;padding:3px 9px;margin-left:6px}
.tp{background:#EAF3DE;color:#173404}.tf{background:#FCEBEB;color:#501313}
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-top:1rem}
.stat{background:#f5f4f0;border-radius:10px;padding:12px}
.sn{font-size:22px;font-weight:600}.sl{font-size:12px;color:#888;margin-top:2px}
.hrow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0efe9;font-size:13px}
.hrow:last-child{border-bottom:none}
.step{display:none}.step.on{display:block}
.sending{font-size:13px;color:#888;margin-top:8px}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #ddd;border-top-color:#1a1a18;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">

<div id="s1" class="step on">
  <div class="card">
    <h1>Kitob o'qish testi</h1>
    <p class="sub">Pasport raqamingizni kiriting</p>
    <label>Pasport raqami</label>
    <div class="passport-wrap">
      <input type="text" id="passport" placeholder="AA1234567" maxlength="9" oninput="this.value=this.value.toUpperCase()">
      <button class="qbtn" id="searchBtn">Qidirish</button>
    </div>
    <div id="searchErr" class="errmsg"></div>
    <div id="studentCard" style="display:none">
      <div class="student-card">
        <div class="student-name" id="sFullName"></div>
        <div class="info-grid">
          <div class="info-item"><div class="info-label">JSHSHIR</div><div class="info-val" id="sJshshir"></div></div>
          <div class="info-item"><div class="info-label">Ta'lim turi</div><div class="info-val" id="sTalimTuri"></div></div>
          <div class="info-item"><div class="info-label">Ta'lim shakli</div><div class="info-val" id="sTalimShakli"></div></div>
          <div class="info-item"><div class="info-label">Mutaxassislik</div><div class="info-val" id="sMutax"></div></div>
          <div class="info-item"><div class="info-label">Kurs</div><div class="info-val" id="sKurs"></div></div>
          <div class="info-item"><div class="info-label">Guruh</div><div class="info-val" id="sGuruh"></div></div>
          <div class="info-item" style="grid-column:1/-1"><div class="info-label">Fakultet</div><div class="info-val" id="sFakultet"></div></div>
        </div>
      </div>
      <div class="bar" style="margin-top:14px">
        <button class="btn" id="continueBtn">Davom etish &rarr;</button>
        <button class="btn btn-out" id="resetBtn">Boshqa pasport</button>
      </div>
    </div>
  </div>
</div>

<div id="s2" class="step">
  <div class="card">
    <div style="font-size:13px;color:#888;margin-bottom:4px" id="s2name"></div>
    <h1>Kitob tanlang</h1>
    <p class="sub">Topshirmoqchi bo'lgan kitobni tanlang</p>
    <div class="book-grid" id="bgrid"></div>
    <div id="e2" class="errmsg"></div>
    <div class="bar" style="margin-top:1.2rem">
      <button class="btn" id="startBtn">Testni boshlash &rarr;</button>
      <button class="btn btn-out" id="backBtn">Orqaga</button>
      <button class="btn btn-out" id="sumBtn">Natijalarim &rarr;</button>
    </div>
  </div>
</div>

<div id="s3" class="step">
  <div class="card" style="margin-bottom:12px">
    <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <div>
        <div style="font-size:15px;font-weight:500" id="ttitle"></div>
        <div style="font-size:12px;color:#888" id="tmeta"></div>
      </div>
      <div style="font-size:13px;color:#888" id="tcount"></div>
    </div>
  </div>
  <div id="qlist"></div>
  <div class="bar">
    <button class="btn" id="cbtn">Natijani ko'rish</button>
    <button class="btn btn-out" id="rbtn" style="display:none">Qayta urinish</button>
    <button class="btn btn-out" id="booksBtn2">Boshqa kitob</button>
    <button class="btn btn-out" id="sumBtn2">Natijalarim</button>
    <span class="prog" id="ptext">0/20 javob berildi</span>
  </div>
  <div id="send" class="sending"></div>
</div>

<div id="s4" class="step">
  <div class="card">
    <h1>Umumiy natijalar</h1>
    <p class="sub" id="sname"></p>
    <div class="sgrid">
      <div class="stat"><div class="sn" id="stotal">0</div><div class="sl">Topshirilgan</div></div>
      <div class="stat"><div class="sn" id="spass">0</div><div class="sl">O'tdi</div></div>
      <div class="stat"><div class="sn" id="sfail">0</div><div class="sl">O'tmadi</div></div>
    </div>
    <div style="margin-top:1.2rem;font-size:13px;font-weight:500;color:#555;margin-bottom:8px">Batafsil</div>
    <div id="hlist"></div>
    <div class="bar" style="margin-top:1rem">
      <button class="btn" id="moreBooksBtn">Yana bir kitob topshirish</button>
    </div>
  </div>
</div>

</div>

var studentInfo = {};
var selBook = null;
var selAns = [];
var checked = false;
var hist = [];

function go(id) {
  document.querySelectorAll('.step').forEach(function(s) { s.classList.remove('on'); });
  document.getElementById(id).classList.add('on');
  window.scrollTo(0, 0);
}

function showErr(id, msg) {
  var el = document.getElementById(id);
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

function searchStudent() {
  var p = document.getElementById('passport').value.trim().toUpperCase();
  if (!p) { showErr('searchErr', 'Pasport raqamini kiriting!'); return; }
  showErr('searchErr', '');
  document.getElementById('studentCard').style.display = 'none';
  var btn = document.getElementById('searchBtn');
  btn.disabled = true;
  btn.textContent = '...';

  var cbName = 'cb' + Date.now();
  var done = false;

  window[cbName] = function(d) {
    done = true;
    cleanup();
    btn.disabled = false;
    btn.textContent = 'Qidirish';
    if (!d || !d.found) {
      showErr('searchErr', 'Pasport raqami topilmadi. Qayta tekshiring.');
      return;
    }
    studentInfo = {
      passport: p,
      fish: d.fullName || '',
      jshshir: d.jshshir || '',
      talimTuri: d.talimuturi || '',
      talimShakli: d.talimshakli || '',
      mutax: d.mutaxassislik || '',
      kurs: d.kurs || '',
      guruh: d.guruh || '',
      fakultet: d.fakultet || ''
    };
    document.getElementById('sFullName').textContent = studentInfo.fish;
    document.getElementById('sJshshir').textContent = studentInfo.jshshir || '-';
    document.getElementById('sTalimTuri').textContent = studentInfo.talimTuri || '-';
    document.getElementById('sTalimShakli').textContent = studentInfo.talimShakli || '-';
    document.getElementById('sMutax').textContent = studentInfo.mutax || '-';
    document.getElementById('sKurs').textContent = studentInfo.kurs || '-';
    document.getElementById('sGuruh').textContent = studentInfo.guruh || '-';
    document.getElementById('sFakultet').textContent = studentInfo.fakultet || '-';
    document.getElementById('studentCard').style.display = 'block';
  };

  var script = document.createElement('script');
  script.src = SHEET_URL + '?passport=' + encodeURIComponent(p) + '&callback=' + cbName;

  function cleanup() {
    if (script.parentNode) script.parentNode.removeChild(script);
    delete window[cbName];
  }

  var timer = setTimeout(function() {
    if (!done) {
      cleanup();
      btn.disabled = false;
      btn.textContent = 'Qidirish';
      showErr('searchErr', 'Vaqt tugadi. Internet aloqasini tekshiring.');
    }
  }, 12000);

  script.onerror = function() {
    clearTimeout(timer);
    cleanup();
    btn.disabled = false;
    btn.textContent = 'Qidirish';
    showErr('searchErr', 'Ulanishda xatolik. Qayta urinib ko\'ring.');
  };

  document.body.appendChild(script);
}

document.getElementById('searchBtn').onclick = searchStudent;
document.getElementById('passport').onkeydown = function(e) {
  if (e.key === 'Enter') searchStudent();
};

document.getElementById('continueBtn').onclick = function() { goBooks(); };
document.getElementById('resetBtn').onclick = function() {
  document.getElementById('passport').value = '';
  document.getElementById('studentCard').style.display = 'none';
  showErr('searchErr', '');
  studentInfo = {};
};

document.getElementById('startBtn').onclick = function() { startTest(); };
document.getElementById('backBtn').onclick = function() { go('s1'); };
document.getElementById('sumBtn').onclick = function() { goSum(); };
document.getElementById('cbtn').onclick = function() { checkTest(); };
document.getElementById('rbtn').onclick = function() { retry(); };
document.getElementById('booksBtn2').onclick = function() { goBooks(); };
document.getElementById('sumBtn2').onclick = function() { goSum(); };
document.getElementById('moreBooksBtn').onclick = function() { goBooks(); };

function goBooks() {
  if (!studentInfo.fish) { go('s1'); return; }
  checked = false; selAns = []; selBook = null;
  document.getElementById('s2name').textContent = studentInfo.fish;
  renderBooks();
  go('s2');
}

function renderBooks() {
  var g = document.getElementById('bgrid');
  g.innerHTML = BOOKS.map(function(b) {
    var h = hist.find(function(x) { return x.bid === b.id; });
    var done = !!h;
    var badge = done ? (h.pass ? '<div class="bs pass-s">O\'tdi ✓</div>' : '<div class="bs fail-s">O\'tmadi ✗</div>') : '';
    var style = done ? 'opacity:0.55;cursor:not-allowed;' : '';
    var click = done ? '' : 'onclick="pickBook(' + b.id + ')"';
    return '<div class="bcard' + (selBook === b.id ? ' on' : '') + '" id="bc' + b.id + '" ' + click + ' style="' + style + '"><div class="bt">' + b.t + '</div><div class="ba">' + b.a + '</div>' + badge + '</div>';
  }).join('');
}

function pickBook(id) {
  var h = hist.find(function(x) { return x.bid === id; });
  if (h) return;
  selBook = id;
  document.querySelectorAll('.bcard').forEach(function(c) { c.classList.remove('on'); });
  document.getElementById('bc' + id).classList.add('on');
  showErr('e2', '');
}

function startTest() {
  if (!selBook) { showErr('e2', 'Iltimos, kitob tanlang!'); return; }
  checked = false;
  var qs = TESTS[selBook];
  selAns = new Array(qs.length).fill(-1);
  var b = BOOKS.find(function(x) { return x.id === selBook; });
  document.getElementById('ttitle').textContent = b.t;
  document.getElementById('tmeta').textContent = b.a + ' · 20 ta savol · 17+ to\'g\'ri = o\'tdi';
  renderQs();
  document.getElementById('cbtn').disabled = false;
  document.getElementById('rbtn').style.display = 'none';
  document.getElementById('send').textContent = '';
  go('s3');
}

function renderQs() {
  var qs = TESTS[selBook];
  document.getElementById('qlist').innerHTML = qs.map(function(item, i) {
    return '<div class="qblock"><div class="qt">' + item.q + '</div>' +
      item.o.map(function(opt, j) {
        return '<div class="opt" id="o' + i + '_' + j + '" onclick="pickAns(' + i + ',' + j + ')"><span class="ol">' + 'ABCD'[j] + '</span><span>' + opt + '</span></div>';
      }).join('') + '</div>';
  }).join('');
  updProg();
}

function pickAns(i, j) {
  if (checked) return;
  selAns[i] = j;
  TESTS[selBook][i].o.forEach(function(_, k) {
    document.getElementById('o' + i + '_' + k).className = 'opt' + (k === j ? ' sel' : '');
  });
  updProg();
}

function updProg() {
  var n = selAns.filter(function(x) { return x !== -1; }).length;
  document.getElementById('ptext').textContent = n + '/20 javob berildi';
  document.getElementById('tcount').textContent = n + '/20';
}

function checkTest() {
  if (selAns.filter(function(x) { return x !== -1; }).length < 20) {
    alert('Barcha 20 ta savolga javob bering!'); return;
  }
  checked = true;
  var qs = TESTS[selBook];
  var score = 0;
  qs.forEach(function(item, i) {
    var chosen = selAns[i];
    var el = document.getElementById('o' + i + '_' + chosen);
    el.className = 'opt';
    if (chosen === item.a) {
      el.classList.add('ok');
    } else {
      el.classList.add('err');
    }
    if (chosen === item.a) score++;
  });
  var pass = score >= 17;
  var b = BOOKS.find(function(x) { return x.id === selBook; });
  hist = hist.filter(function(h) { return h.bid !== selBook; });
  hist.push({ bid: selBook, bt: b.t, score: score, pass: pass });
  document.getElementById('cbtn').disabled = true;
  document.getElementById('rbtn').style.display = 'none';
  document.getElementById('ptext').innerHTML = 'To\'g\'ri: ' + score + '/20 <span class="tag ' + (pass ? 'tp' : 'tf') + '">' + (pass ? "O'tdi" : "O'tmadi") + '</span>';
  sendSheet(score, pass, b.t);
  renderBooks();
}

function goSum() {
  document.getElementById('sname').textContent = studentInfo.fish || '';
  document.getElementById('stotal').textContent = hist.length;
  document.getElementById('spass').textContent = hist.filter(function(h) { return h.pass; }).length;
  document.getElementById('sfail').textContent = hist.filter(function(h) { return !h.pass; }).length;
  var hl = document.getElementById('hlist');
  hl.innerHTML = hist.length ? hist.map(function(h) {
    return '<div class="hrow"><span>' + h.bt + '</span><span>' + h.score + '/20 <span class="tag ' + (h.pass ? 'tp' : 'tf') + '">' + (h.pass ? "O'tdi" : "O'tmadi") + '</span></span></div>';
  }).join('') : '<div style="font-size:13px;color:#aaa;padding:8px 0">Hali test topshirilmagan</div>';
  go('s4');
}

function sendSheet(score, pass, bookTitle) {
  var sd = document.getElementById('send');
  sd.innerHTML = '<span class="spinner"></span>Natija yuborilmoqda...';

  var params = [
    'action=save',
    'passport=' + encodeURIComponent(studentInfo.passport || ''),
    'fish=' + encodeURIComponent(studentInfo.fish || ''),
    'guruh=' + encodeURIComponent(studentInfo.guruh || ''),
    'kurs=' + encodeURIComponent(studentInfo.kurs || ''),
    'fakultet=' + encodeURIComponent(studentInfo.fakultet || ''),
    'kitob=' + encodeURIComponent(bookTitle || ''),
    'togri=' + score,
    'jami=20',
    'natija=' + encodeURIComponent(pass ? "O'tdi" : "O'tmadi"),
    'callback=saveCb' + Date.now()
  ];
  var cbName = 'saveCb' + Date.now();
  var script = document.createElement('script');
  var done = false;

  window[cbName] = function(res) {
    done = true;
    if (script.parentNode) script.parentNode.removeChild(script);
    delete window[cbName];
    sd.textContent = 'Natija muvaffaqiyatli yuborildi.';
  };

  var timer = setTimeout(function() {
    if (!done) {
      if (script.parentNode) script.parentNode.removeChild(script);
      delete window[cbName];
      sd.textContent = 'Natija yuborildi (tasdiqlash kelmadi).';
    }
  }, 10000);

  script.onerror = function() {
    clearTimeout(timer);
    if (script.parentNode) script.parentNode.removeChild(script);
    delete window[cbName];
    sd.textContent = 'Yuborishda xatolik.';
  };

  script.src = SHEET_URL + '?' + [
    'action=save',
    'passport=' + encodeURIComponent(studentInfo.passport || ''),
    'fish=' + encodeURIComponent(studentInfo.fish || ''),
    'guruh=' + encodeURIComponent(studentInfo.guruh || ''),
    'kurs=' + encodeURIComponent(studentInfo.kurs || ''),
    'fakultet=' + encodeURIComponent(studentInfo.fakultet || ''),
    'kitob=' + encodeURIComponent(bookTitle || ''),
    'togri=' + score,
    'jami=20',
    'natija=' + encodeURIComponent(pass ? "O'tdi" : "O'tmadi"),
    'callback=' + cbName
  ].join('&');

  document.body.appendChild(script);
}
</script>
